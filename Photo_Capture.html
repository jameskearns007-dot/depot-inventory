<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Parts Depot — Slow Moving Inventory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #232323;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent-dim: #c8df27;
    --danger: #ff4d4d;
    --done: #47ffb2;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .facility-badge {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .progress-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .progress-bar-outer {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* LOCATION FILTERS */
  .location-strip {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .location-strip::-webkit-scrollbar { display: none; }

  .loc-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .loc-select:focus, .loc-select.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SEARCH */
  .search-wrap {
    padding: 10px 16px 0;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* PARTS LIST */
  .parts-list {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .part-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    position: relative;
  }
  .part-card:active { transform: scale(0.985); }
  .part-card.has-photo { border-color: var(--done); }
  .part-card.has-photo .part-card-inner { opacity: 1; }

  .part-card-inner {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .photo-thumb {
    width: 72px;
    flex-shrink: 0;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-thumb .no-photo-icon {
    font-size: 22px;
    opacity: 0.3;
  }
  .done-tick {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--done);
    color: #000;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
  }

  .part-info {
    flex: 1;
    padding: 10px 12px;
    min-width: 0;
  }
  .part-number {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .part-account {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .part-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }
  .meta-chip span {
    color: var(--text-muted);
  }
  .part-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    padding: 10px 12px 10px 0;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  /* LOCATION TAG */
  .location-tag {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 20px 20px 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-part-number {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 4px;
    word-break: break-all;
  }
  .modal-account {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* PHOTO SECTION */
  .photo-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .photo-main {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .photo-main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
  }
  .photo-placeholder .icon { font-size: 48px; }
  .photo-placeholder .label {
    font-family: var(--mono);
    font-size: 12px;
  }

  .photo-actions {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
  }
  .photo-btn {
    flex: 1;
    padding: 14px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .photo-btn:first-child { border-right: 1px solid var(--border); }
  .photo-btn:hover, .photo-btn:active { background: var(--border); }
  .photo-btn.primary { color: var(--accent); }

  /* MULTI PHOTO TOGGLE */
  .multi-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .multi-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
  }
  .toggle-switch input { display: none; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: all 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(18px);
    background: #000;
  }

  /* ADDITIONAL PHOTOS */
  .additional-photos {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .additional-photos.visible { display: flex; }
  .add-photo-thumb {
    width: 72px;
    height: 72px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }
  .add-photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .add-photo-thumb .plus {
    font-size: 20px;
    color: var(--text-dim);
  }
  .remove-extra {
    position: absolute;
    top: 2px;
    right: 2px;
    background: var(--danger);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* DATA GRID */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .data-cell {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .data-cell.full { grid-column: 1 / -1; }
  .data-cell .label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .data-cell .value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }
  .data-cell .value.highlight { color: var(--accent); font-size: 15px; }
  .data-cell .value.danger { color: var(--danger); }

  /* LOCATION ASSIGN */
  .location-assign {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 20px;
  }
  .location-assign-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .location-selects {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .loc-assign-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
  }
  .loc-assign-select:focus { border-color: var(--accent); }

  .save-location-btn {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-location-btn:active { background: var(--accent); color: #000; }

  /* CLOSE BTN */
  .close-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .close-btn:active { background: var(--border); }

  /* HIDDEN FILE INPUT */
  #cameraInput, #cameraInputExtra { display: none; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .stat {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }
  .stat span { color: var(--text-muted); }

  .count-badge {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--surface2);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="facility-badge">⬡ Parts Depot</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="loadBtn" onclick="triggerCSVLoad()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;">📂 Load Parts CSV</button>
      <div class="progress-wrap">
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>
    </div>
  </div>
  <div class="location-strip">
    <select class="loc-select" id="filterZone" onchange="applyFilters()">
      <option value="">All Areas</option>
      <option value="UNASSIGNED">Unassigned</option>
      <option value="Upstairs (Cage Area)">Upstairs (Cage Area)</option>
      <option value="Floor (In Cage)">Floor (In Cage)</option>
      <option value="HMC Clean Room">HMC Clean Room</option>
      <option value="HMC Supplies">HMC Supplies</option>
      <option value="Elec_EngRack">Elec_EngRack</option>
      <option value="Mech_EngRack">Mech_EngRack</option>
      <option value="RawMaterial">RawMaterial</option>
      <option value="Spot Buy">Spot Buy</option>
    </select>
    <select class="loc-select" id="filterRack" onchange="applyFilters()">
      <option value="">All Racks</option>
    </select>
    <select class="loc-select" id="filterShelf" onchange="applyFilters()">
      <option value="">All Rows</option>
    </select>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-input" type="text" id="searchInput" placeholder="Search item number..." oninput="applyFilters()">
</div>

<!-- FILTER TABS -->
<div class="filter-tabs">
  <div class="filter-tab active" data-filter="all" onclick="setTab(this,'all')">All Parts</div>
  <div class="filter-tab" data-filter="undone" onclick="setTab(this,'undone')">No Photo</div>
  <div class="filter-tab" data-filter="done" onclick="setTab(this,'done')">Photographed</div>
  <div class="filter-tab" data-filter="2400-24" onclick="setTab(this,'2400-24')">2400-24</div>
  <div class="filter-tab" data-filter="2400-22" onclick="setTab(this,'2400-22')">2400-22</div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat">Total Value: <span id="statValue">—</span></div>
  <div class="stat">Avg Days: <span id="statDays">—</span></div>
  <div class="count-badge" id="countBadge">10 parts</div>
</div>

<!-- PARTS LIST -->
<div class="parts-list" id="partsList"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-part-number" id="modalPartNumber"></div>
    <div class="modal-account" id="modalAccount"></div>

    <!-- PHOTO -->
    <div class="photo-section">
      <div class="photo-main" id="photoMain">
        <div class="photo-placeholder">
          <div class="icon">📦</div>
          <div class="label">No photo yet</div>
        </div>
      </div>
      <div class="photo-actions">
        <button class="photo-btn primary" onclick="triggerCamera()">📷 Take Photo</button>
        <button class="photo-btn" onclick="triggerGallery()">🖼 Choose File</button>
      </div>
    </div>

    <!-- MULTI PHOTO TOGGLE -->
    <div class="multi-toggle">
      <div class="multi-label">Multiple photos for this part</div>
      <label class="toggle-switch">
        <input type="checkbox" id="multiToggle" onchange="toggleMulti(this)">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- ADDITIONAL PHOTOS -->
    <div class="additional-photos" id="additionalPhotos">
      <div class="add-photo-thumb" onclick="triggerExtraCamera()">
        <div class="plus">+</div>
      </div>
    </div>

    <!-- DATA -->
    <div class="data-grid" id="dataGrid"></div>

    <!-- LOCATION ASSIGN -->
    <div class="location-assign">
      <div class="location-assign-title">Assign / Update Location</div>
      <div class="location-selects">
        <select class="loc-assign-select" id="assignZone" onchange="updateAssignRacks()">
          <option value="">Area</option>
          <option value="Upstairs (Cage Area)">Upstairs (Cage Area)</option>
          <option value="Floor (In Cage)">Floor (In Cage)</option>
          <option value="HMC Clean Room">HMC Clean Room</option>
          <option value="HMC Supplies">HMC Supplies</option>
          <option value="Elec_EngRack">Elec_EngRack</option>
          <option value="Mech_EngRack">Mech_EngRack</option>
          <option value="RawMaterial">RawMaterial</option>
          <option value="Spot Buy">Spot Buy</option>
        </select>
        <select class="loc-assign-select" id="assignRack" onchange="updateAssignShelves()">
          <option value="">Rack</option>
        </select>
        <select class="loc-assign-select" id="assignShelf">
          <option value="">Row</option>
        </select>
      </div>
      <button class="save-location-btn" onclick="saveLocation()">Save Location</button>
    </div>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- HIDDEN INPUTS -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">
<input type="file" id="galleryInput" accept="image/*" onchange="handlePhoto(this)">
<input type="file" id="cameraInputExtra" accept="image/*" capture="environment" onchange="handleExtraPhoto(this)">
<input type="file" id="csvInput" accept=".csv,.txt,.tsv" onchange="handleCSVLoad(this)">

<script>

// ── STATE ─────────────────────────────────────────────────────────────────────
let parts = [];
let activeTab = 'all';
let currentPartId = null;

// ── UNIQUE KEY ────────────────────────────────────────────────────────────────
// Item Number + Account Code = unique identifier for every part
function partKey(item, account) {
  return `${item}||${account}`;
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
// State is stored by unique key — survives CSV reloads, appends, replacements
function saveState() {
  const state = {};
  parts.forEach(p => {
    state[partKey(p.item, p.account)] = {
      photo:       p.photo,
      extraPhotos: p.extraPhotos,
      multiPhoto:  p.multiPhoto,
      zone:        p.zone,
      rack:        p.rack,
      shelf:       p.shelf,
    };
  });
  localStorage.setItem('depot_parts_state_v2', JSON.stringify(state));
}

function getSavedState() {
  const saved = localStorage.getItem('depot_parts_state_v2');
  return saved ? JSON.parse(saved) : {};
}

// ── BUILD PARTS FROM RAW ──────────────────────────────────────────────────────
function buildParts(rawArray) {
  const saved = getSavedState();
  parts = rawArray.map((p, i) => {
    const key = partKey(p.item, p.account);
    const s   = saved[key] || {};
    return {
      id:          i,
      item:        p.item,
      account:     p.account,
      qtyBuy:      parseFloat(p.qtyBuy)   || 0,
      qtyReq:      parseFloat(p.qtyReq)   || 0,
      qtyShip:     parseFloat(p.qtyShip)  || 0,
      unitCost:    parseFloat(p.unitCost) || 0,
      subTotal:    parseFloat(p.subTotal) || 0,
      totalVal:    parseFloat(p.totalVal) || 0,
      daysAvg:     parseFloat(p.daysAvg)  || 0,
      qtyOnHand:   parseFloat(p.qtyOnHand)|| 0,
      cost:        parseFloat(p.cost)     || 0,
      // Location: saved state wins over CSV data (Satvir's assignments are authoritative)
      zone:        s.zone  !== undefined ? s.zone  : (p.region || null),
      rack:        s.rack  !== undefined ? s.rack  : (p.rack   || null),
      shelf:       s.shelf !== undefined ? s.shelf : (p.row    || null),
      // Photo state
      photo:       s.photo       || null,
      extraPhotos: s.extraPhotos || [],
      multiPhoto:  s.multiPhoto  || false,
    };
  });
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
// Expected columns (order matters, matches template):
// Item Number, Account Code, QtyBuy, Qty Requested, Qty Shipped,
// Unit Cost AVG, Sub Total AVG, Total value, Days AVG,
// Facility, Location 2 (region), Location 3 (rack), Location 4 (row),
// Qty on Hand, Cost
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return null;

  // Detect delimiter (tab or comma)
  const delim = lines[0].includes('\t') ? '\t' : ',';

  const headers = lines[0].split(delim).map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = [];

  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i], delim);
    if (vals.length < 2) continue;
    const row = {};
    headers.forEach((h, idx) => { row[h] = (vals[idx] || '').trim().replace(/^"|"$/g, ''); });
    rows.push(row);
  }

  // Map headers to internal field names (flexible — handles variations)
  return rows.map(r => ({
    item:      r['Item Number']   || r['item']    || '',
    account:   r['Account Code']  || r['account'] || '',
    qtyBuy:    r['QtyBuy']        || r['Qty Buy'] || 0,
    qtyReq:    r['Qty Requested'] || r['qtyReq']  || 0,
    qtyShip:   r['Qty Shipped']   || r['qtyShip'] || 0,
    unitCost:  r['Unit Cost AVG'] || r['unitCost']|| 0,
    subTotal:  r['Sub Total AVG'] || r['subTotal']|| 0,
    totalVal:  r['Total value']   || r['totalVal']|| 0,
    daysAvg:   r['Days AVG']      || r['daysAvg'] || 0,
    region:    r['Location 2']    || r['region']  || '',
    rack:      r['Location 3']    || r['rack']    || '',
    row:       r['Location 4']    || r['row']     || '',
    qtyOnHand: r['Qty on Hand']   || r['qtyOnHand']|| 0,
    cost:      r['Cost']          || r['cost']    || 0,
  })).filter(r => r.item && r.account);
}

function splitCSVLine(line, delim) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === delim && !inQuotes) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

// ── CSV LOAD TRIGGER ──────────────────────────────────────────────────────────
function triggerCSVLoad() {
  document.getElementById('csvInput').click();
}

function handleCSVLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);
    if (!parsed || parsed.length === 0) {
      alert('Could not read file. Check that it matches the CSV template.');
      input.value = '';
      return;
    }
    buildParts(parsed);
    saveState();
    applyFilters();
    // Show confirmation
    const btn = document.getElementById('loadBtn');
    btn.textContent = `✓ ${parsed.length} parts loaded`;
    btn.style.color = 'var(--done)';
    setTimeout(() => { btn.textContent = '📂 Load Parts CSV'; btn.style.color = ''; }, 3000);
    input.value = '';
  };
  reader.readAsText(file);
}

// ── LOCATION HIERARCHY ────────────────────────────────────────────────────────
const LOCATION_MAP = {
  'Upstairs (Cage Area)': ['Rack 1','Rack 2','Rack 2A','Rack 2B','Rack 2C','Rack 3','Rack 4','Rack 5','Rack 6','In Cabinet','Engineer Rack'],
  'Floor (In Cage)':      ['Rack 1','Rack 2','Rack 3'],
  'HMC Clean Room':       ['Rack 1','Rack 2','Rack 3'],
  'HMC Supplies':         ['Rack 1','Rack 2','Rack 3'],
  'Elec_EngRack':         ['Rack 1','Rack 2','Rack 3'],
  'Mech_EngRack':         ['Rack 1','Rack 2','Rack 3'],
  'RawMaterial':          ['Rack 1','Rack 2','Rack 3'],
  'Spot Buy':             ['Rack 1','Rack 2','Rack 3'],
};
const AREAS = Object.keys(LOCATION_MAP);
const ROWS = ['Row 1','Row 2','Row 3','Row 4','Row 5','Row 6'];

function populateSelect(sel, options, placeholder) {
  sel.innerHTML = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    sel.appendChild(opt);
  });
}

function updateFilterRacks() {
  const area = document.getElementById('filterZone').value;
  const rackSel = document.getElementById('filterRack');
  const rowSel = document.getElementById('filterShelf');
  if (area && area !== 'UNASSIGNED' && LOCATION_MAP[area]) {
    populateSelect(rackSel, LOCATION_MAP[area], 'All Racks');
  } else {
    rackSel.innerHTML = '<option value="">All Racks</option>';
  }
  rowSel.innerHTML = '<option value="">All Rows</option>';
  applyFilters();
}

function updateFilterShelves() {
  const rack = document.getElementById('filterRack').value;
  const rowSel = document.getElementById('filterShelf');
  if (rack) {
    populateSelect(rowSel, ROWS, 'All Rows');
  } else {
    rowSel.innerHTML = '<option value="">All Rows</option>';
  }
  applyFilters();
}

document.getElementById('filterZone').onchange = updateFilterRacks;
document.getElementById('filterRack').onchange = updateFilterShelves;

function updateAssignRacks() {
  const area = document.getElementById('assignZone').value;
  const rackSel = document.getElementById('assignRack');
  const rowSel = document.getElementById('assignShelf');
  if (area && LOCATION_MAP[area]) {
    populateSelect(rackSel, LOCATION_MAP[area], 'Rack');
  } else {
    rackSel.innerHTML = '<option value="">Rack</option>';
  }
  rowSel.innerHTML = '<option value="">Row</option>';
}

function updateAssignShelves() {
  const rack = document.getElementById('assignRack').value;
  const rowSel = document.getElementById('assignShelf');
  if (rack) {
    populateSelect(rowSel, ROWS, 'Row');
  } else {
    rowSel.innerHTML = '<option value="">Row</option>';
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function setTab(el, filter) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeTab = filter;
  applyFilters();
}

function applyFilters() {
  const zone = document.getElementById('filterZone').value;
  const rack = document.getElementById('filterRack').value;
  const shelf = document.getElementById('filterShelf').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = parts.filter(p => {
    if (search && !p.item.toLowerCase().includes(search)) return false;
    if (zone === 'UNASSIGNED') { if (p.zone) return false; }
    else if (zone && p.zone !== zone) return false;
    if (rack && p.rack !== rack) return false;
    if (shelf && p.shelf !== shelf) return false;
    if (activeTab === 'done' && !p.photo) return false;
    if (activeTab === 'undone' && p.photo) return false;
    if (activeTab === '2400-24' && !p.account.includes('2400-24')) return false;
    if (activeTab === '2400-22' && !p.account.includes('2400-22')) return false;
    return true;
  });

  renderList(filtered);
  updateProgress();
  updateStats(filtered);
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList(filtered) {
  const list = document.getElementById('partsList');
  document.getElementById('countBadge').textContent = `${filtered.length} part${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0 && parts.length === 0) {
    list.innerHTML = '<div class="empty-state">No parts loaded yet.<br>Tap <strong style="color:var(--accent)">📂 Load Parts CSV</strong> to begin.</div>';
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No parts match these filters</div>';
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="part-card ${p.photo ? 'has-photo' : ''}" data-part-id="${p.id}" style="cursor:pointer;">
      <div class="part-card-inner" style="pointer-events:none;">
        <div class="photo-thumb">
          ${p.photo
            ? `<img src="${p.photo}" alt=""><div class="done-tick">✓</div>`
            : `<div class="no-photo-icon">📦</div>`}
        </div>
        <div class="part-info">
          <div class="part-number">${p.item}</div>
          <div class="part-account">${p.account}</div>
          <div class="part-meta">
            <div class="meta-chip">Qty: <span>${p.qtyOnHand}</span></div>
            <div class="meta-chip">Days: <span>${p.daysAvg}</span></div>
          </div>
          <div class="location-tag">${p.zone ? `${p.zone} · ${p.rack} · ${p.shelf}` : '⚠ Unassigned'}</div>
        </div>
        <div class="part-value">$${p.totalVal.toLocaleString('en-CA', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
      </div>
    </div>
  `).join('');
}

function updateProgress() {
  const done = parts.filter(p => p.photo).length;
  const total = parts.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
}

function updateStats(filtered) {
  const totalVal = filtered.reduce((s, p) => s + p.totalVal, 0);
  const avgDays = filtered.length ? Math.round(filtered.reduce((s, p) => s + p.daysAvg, 0) / filtered.length) : 0;
  document.getElementById('statValue').textContent = '$' + totalVal.toLocaleString('en-CA', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('statDays').textContent = avgDays + 'd';
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  currentPartId = id;
  const p = parts[id];

  document.getElementById('modalPartNumber').textContent = p.item;
  document.getElementById('modalAccount').textContent = p.account + ' · ' + (p.zone ? `${p.zone} / ${p.rack} / ${p.shelf}` : 'Unassigned');

  // Photo
  const photoMain = document.getElementById('photoMain');
  if (p.photo) {
    photoMain.innerHTML = `<img src="${p.photo}" alt="Part photo">`;
  } else {
    photoMain.innerHTML = `<div class="photo-placeholder"><div class="icon">📦</div><div class="label">No photo yet</div></div>`;
  }

  // Multi toggle
  const mt = document.getElementById('multiToggle');
  mt.checked = p.multiPhoto;
  const ap = document.getElementById('additionalPhotos');
  ap.classList.toggle('visible', p.multiPhoto);
  renderExtraPhotos(p);

  // Data grid
  const neg = p.totalVal < 0;
  document.getElementById('dataGrid').innerHTML = `
    <div class="data-cell full">
      <div class="label">Total Inventory Value</div>
      <div class="value highlight ${neg ? 'danger' : ''}">$${p.totalVal.toLocaleString('en-CA', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
    </div>
    <div class="data-cell">
      <div class="label">Days in Inventory (Avg)</div>
      <div class="value">${p.daysAvg}</div>
    </div>
    <div class="data-cell">
      <div class="label">Qty on Hand</div>
      <div class="value">${p.qtyOnHand}</div>
    </div>
    <div class="data-cell">
      <div class="label">Unit Cost (Avg)</div>
      <div class="value">$${p.unitCost.toFixed(2)}</div>
    </div>
    <div class="data-cell">
      <div class="label">Current Cost</div>
      <div class="value">$${p.cost.toFixed(2)}</div>
    </div>
    <div class="data-cell">
      <div class="label">Qty Requested</div>
      <div class="value">${p.qtyReq}</div>
    </div>
    <div class="data-cell">
      <div class="label">Qty Shipped</div>
      <div class="value">${p.qtyShip}</div>
    </div>
    <div class="data-cell">
      <div class="label">Qty Buy</div>
      <div class="value">${p.qtyBuy}</div>
    </div>
  `;

  // Location assign
  const az = document.getElementById('assignZone');
  const ar = document.getElementById('assignRack');
  const as_ = document.getElementById('assignShelf');
  az.value = p.zone || '';
  if (p.zone) {
    populateSelect(ar, RACKS, 'Rack');
    ar.value = p.rack || '';
    if (p.rack) {
      populateSelect(as_, SHELVES, 'Shelf');
      as_.value = p.shelf || '';
    }
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentPartId = null;
  applyFilters();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── PHOTO CAPTURE ─────────────────────────────────────────────────────────────
function triggerCamera() {
  document.getElementById('cameraInput').click();
}
function triggerGallery() {
  document.getElementById('galleryInput').click();
}
function triggerExtraCamera() {
  document.getElementById('cameraInputExtra').click();
}

function handlePhoto(input) {
  const file = input.files[0];
  if (!file || currentPartId === null) return;
  const reader = new FileReader();
  reader.onload = e => {
    parts[currentPartId].photo = e.target.result;
    saveState();
    // Update modal photo instantly
    document.getElementById('photoMain').innerHTML = `<img src="${e.target.result}" alt="Part photo">`;
    input.value = '';
  };
  reader.readAsDataURL(file);
}

function handleExtraPhoto(input) {
  const file = input.files[0];
  if (!file || currentPartId === null) return;
  const reader = new FileReader();
  reader.onload = e => {
    parts[currentPartId].extraPhotos.push(e.target.result);
    saveState();
    renderExtraPhotos(parts[currentPartId]);
    input.value = '';
  };
  reader.readAsDataURL(file);
}

function renderExtraPhotos(p) {
  const ap = document.getElementById('additionalPhotos');
  const thumbs = p.extraPhotos.map((src, i) => `
    <div class="add-photo-thumb">
      <img src="${src}" alt="">
      <button class="remove-extra" onclick="removeExtraPhoto(${i}, event)">×</button>
    </div>
  `).join('');
  ap.innerHTML = thumbs + `<div class="add-photo-thumb" onclick="triggerExtraCamera()"><div class="plus">+</div></div>`;
}

function removeExtraPhoto(index, e) {
  e.stopPropagation();
  if (currentPartId === null) return;
  parts[currentPartId].extraPhotos.splice(index, 1);
  saveState();
  renderExtraPhotos(parts[currentPartId]);
}

function toggleMulti(el) {
  if (currentPartId === null) return;
  parts[currentPartId].multiPhoto = el.checked;
  const ap = document.getElementById('additionalPhotos');
  ap.classList.toggle('visible', el.checked);
  if (el.checked) renderExtraPhotos(parts[currentPartId]);
  saveState();
}

// ── LOCATION SAVE ─────────────────────────────────────────────────────────────
function saveLocation() {
  if (currentPartId === null) return;
  const zone = document.getElementById('assignZone').value;
  const rack = document.getElementById('assignRack').value;
  const shelf = document.getElementById('assignShelf').value;
  if (!zone || !rack || !shelf) {
    alert('Please select Area, Rack, and Row.');
    return;
  }
  parts[currentPartId].zone = zone;
  parts[currentPartId].rack = rack;
  parts[currentPartId].shelf = shelf;
  saveState();
  document.getElementById('modalAccount').textContent =
    parts[currentPartId].account + ` · ${zone} / ${rack} / ${shelf}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
// Event delegation for part cards — fixes Safari mobile tap issue
document.getElementById('partsList').addEventListener('click', function(e) {
  const card = e.target.closest('[data-part-id]');
  if (card) openModal(parseInt(card.dataset.partId));
});
document.getElementById('partsList').addEventListener('touchend', function(e) {
  const card = e.target.closest('[data-part-id]');
  if (card) { e.preventDefault(); openModal(parseInt(card.dataset.partId)); }
});

buildParts([]);
applyFilters();
</script>
